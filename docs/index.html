<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Development Labs Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WD</div>
        <div>
          <p class="eyebrow">GitHub Pages Report</p>
          <h1>Web Labs</h1>
        </div>
      </div>

      <nav class="side-nav" id="lab-navigation"></nav>

      <section class="sidebar-card">
        <p class="sidebar-title">Как использовать</p>
        <p class="muted">
          Этот отчет сделан как универсальная основа для следующих лабораторных.
          Новые ЛР можно просто добавлять отдельными разделами в `docs/app.js`.
        </p>
      </section>
    </aside>

    <main class="content">
      <section class="hero" id="hero"></section>
      <section class="lab-selector" id="lab-selector"></section>
      <section id="lab-content"></section>
    </main>
  </div>

  <template id="code-card-template">
    <article class="code-card">
      <div class="code-card-header">
        <div>
          <p class="code-label"></p>
          <h3 class="code-title"></h3>
        </div>
        <button class="copy-button" type="button">Copy</button>
      </div>
      <pre><code></code></pre>
    </article>
  </template>

  <script src="./code-data.js?v=20260329-2"></script>
  <script src="./app.js?v=20260329-2"></script>
